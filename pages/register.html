<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un compte — ImmoPrestige</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body class="auth-page">

<div id="page-loader"><div class="loader-logo">ImmoPrestige</div><div class="loader-ring"></div></div>
<div class="auth-bg"></div>

<div class="auth-container auth-container--wide">

  <div class="auth-logo">
    <a href="../index.html">
      <svg class="logo-svg" viewBox="0 0 44 44" fill="none">
        <rect width="44" height="44" rx="10" fill="url(#lg3)"/>
        <path d="M22 10L8 20.5V37H16.5V27H27.5V37H36V20.5L22 10Z" stroke="#C9A96E" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="22" cy="20" r="3" fill="#C9A96E"/>
        <defs><linearGradient id="lg3" x1="0" y1="0" x2="44" y2="44"><stop stop-color="#141428"/><stop offset="1" stop-color="#0f0f1e"/></linearGradient></defs>
      </svg>
      <div class="logo-text-wrap">
        <span class="logo-name">Immo<span>Prestige</span></span>
        <span class="logo-tagline">Immobilier Premium</span>
      </div>
    </a>
  </div>

  <div class="auth-card">
    <div class="auth-card-header">
      <h1>Créer votre compte</h1>
      <p>Rejoignez des milliers d'utilisateurs satisfaits</p>
    </div>

    <!-- Sélection rôle -->
    <div class="role-selector">
      <span class="role-label">Je suis :</span>
      <div class="role-options">
        <label class="role-option">
          <input type="radio" name="role" value="tenant" checked>
          <div class="role-card"><span class="role-icon">🔑</span><strong>Locataire</strong><small>Je cherche à louer</small></div>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="buyer">
          <div class="role-card"><span class="role-icon">💰</span><strong>Acheteur</strong><small>Je cherche à acheter</small></div>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="owner">
          <div class="role-card"><span class="role-icon">🏠</span><strong>Propriétaire</strong><small>Je mets en annonce</small></div>
        </label>
      </div>
    </div>

    <form id="registerForm" class="auth-form" novalidate>

      <div class="form-row">
        <div class="form-group">
          <label for="first_name">Prénom *</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="first_name" placeholder="Jean" required>
          </div>
          <span class="field-error" id="firstNameError"></span>
        </div>
        <div class="form-group">
          <label for="last_name">Nom *</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="last_name" placeholder="Dupont" required>
          </div>
          <span class="field-error" id="lastNameError"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Adresse email *</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="jean.dupont@email.com" required>
        </div>
        <span class="field-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="phone">Téléphone</label>
        <div class="input-wrapper">
          <span class="input-icon">📱</span>
          <input type="tel" id="phone" placeholder="+33 6 12 34 56 78">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe *</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="8 caractères minimum" required>
          <button type="button" class="toggle-password"><span class="eye-icon">👁</span></button>
        </div>
        <div class="password-strength">
          <div class="strength-bars">
            <span class="bar"></span><span class="bar"></span>
            <span class="bar"></span><span class="bar"></span>
          </div>
          <small id="strengthText">Saisissez votre mot de passe</small>
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirmer le mot de passe *</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirm_password" placeholder="Répétez votre mot de passe" required>
        </div>
        <span class="field-error" id="confirmError"></span>
      </div>

      <div class="form-group">
        <label class="checkbox-label checkbox-label--block">
          <input type="checkbox" id="acceptCGU" required>
          <span>J'accepte les <a href="cgu.html" target="_blank">CGU</a> et la <a href="confidentialite.html" target="_blank">Politique de confidentialité</a></span>
        </label>
        <span class="field-error" id="cguError"></span>
      </div>

      <div class="alert-message" id="alertMessage" style="display:none;"></div>

      <button type="submit" class="btn-primary btn-full" id="submitBtn">
        <span class="btn-text">Créer mon compte</span>
        <span class="btn-loader" style="display:none;">⏳</span>
      </button>

    </form>

    <div class="auth-divider"><span>Déjà un compte ?</span></div>
    <a href="login.html" class="btn-secondary btn-full">Se connecter</a>
  </div>

  <div class="auth-footer">
    <a href="mentions-legales.html">Mentions légales</a>
    <span>·</span>
    <a href="confidentialite.html">Confidentialité</a>
    <span>·</span>
    <a href="../index.html">Accueil</a>
  </div>

</div>

<script src="../assets/js/loader.js"></script>
<script src="../assets/js/api.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('access_token')) { window.location.href = 'dashboard.html'; return; }

    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const alertMsg = document.getElementById('alertMessage');
    const pwInput = document.getElementById('password');

    document.querySelector('.toggle-password')?.addEventListener('click', function () {
      const isPass = pwInput.type === 'password';
      pwInput.type = isPass ? 'text' : 'password';
      this.querySelector('.eye-icon').textContent = isPass ? '🙈' : '👁';
    });

    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      const bars = document.querySelectorAll('.strength-bars .bar');
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      bars.forEach((bar, i) => {
        bar.className = 'bar';
        if (i < score) bar.classList.add(['weak','fair','good','strong'][Math.min(score-1,3)]);
      });
      document.getElementById('strengthText').textContent = val ? ['Faible','Moyen','Bon','Fort ✅'][score-1] || 'Faible' : 'Saisissez votre mot de passe';
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();

      const data = {
        first_name: document.getElementById('first_name').value.trim(),
        last_name:  document.getElementById('last_name').value.trim(),
        email:      document.getElementById('email').value.trim(),
        phone:      document.getElementById('phone').value.trim(),
        password:   document.getElementById('password').value,
        role:       document.querySelector('input[name="role"]:checked')?.value || 'tenant',
      };
      const confirm = document.getElementById('confirm_password').value;
      const cgu = document.getElementById('acceptCGU').checked;

      let err = false;
      if (data.first_name.length < 2) { showErr('firstNameError', 'Prénom requis'); err = true; }
      if (data.last_name.length < 2)  { showErr('lastNameError', 'Nom requis'); err = true; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(data.email)) { showErr('emailError', 'Email invalide'); err = true; }
      if (data.password.length < 8)   { showErr('passwordError', 'Minimum 8 caractères'); err = true; }
      if (data.password !== confirm)  { showErr('confirmError', 'Les mots de passe ne correspondent pas'); err = true; }
      if (!cgu) { showErr('cguError', 'Vous devez accepter les CGU'); err = true; }
      if (err) return;

      setLoading(true);
      try {
        const res = await API.post('/auth/register', data);
        if (res.success) {
          showAlert('✅ Compte créé ! Vérifiez votre email pour l\'activer.', 'success');
          setTimeout(() => window.location.href = 'login.html', 3000);
        } else { showAlert(res.message || 'Erreur lors de l\'inscription.', 'error'); }
      } catch { showAlert('Erreur de connexion. Réessayez.', 'error'); }
      setLoading(false);
    });

    function setLoading(s) {
      submitBtn.disabled = s;
      document.querySelector('.btn-text').style.display = s ? 'none' : 'inline';
      document.querySelector('.btn-loader').style.display = s ? 'inline' : 'none';
    }
    function showAlert(msg, type) { alertMsg.textContent = msg; alertMsg.className = `alert-message alert-${type}`; alertMsg.style.display = 'block'; }
    function showErr(id, msg) { document.getElementById(id).textContent = msg; }
    function clearErrors() { document.querySelectorAll('.field-error').forEach(el => el.textContent = ''); alertMsg.style.display = 'none'; }
  });
</script>
</body>
</html>
